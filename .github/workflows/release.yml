name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.1.0). Manual runs only upload an artifact; no release is published.'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build DMG & Release
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Initialize Xcode tools
        run: sudo xcodebuild -runFirstLaunch

      - name: Test
        run: swift test

      # Import a stable, reused self-signed code-signing certificate so the app
      # keeps a constant Designated Requirement across releases — this is what
      # lets macOS TCC persist Accessibility/Input Monitoring grants across
      # updates. Falls back to ad-hoc (permissions reset) if the secret is unset.
      - name: Import signing certificate
        id: cert
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$CERT_P12_BASE64" ]; then
            echo "has_cert=false" >> "$GITHUB_OUTPUT"
            echo "::warning::MACOS_CERTIFICATE_P12_BASE64 not set — building ad-hoc; Accessibility/Input Monitoring will reset on update."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          # Put our keychain first in the search list so codesign resolves the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "has_cert=true" >> "$GITHUB_OUTPUT"
          echo "Imported self-signed code-signing identity."

      - name: Build DMG
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [ "${{ steps.cert.outputs.has_cert }}" = "true" ]; then
            export CODE_SIGN_IDENTITY="${{ secrets.MACOS_SIGN_IDENTITY }}"
            echo "Signing app with stable identity: $CODE_SIGN_IDENTITY"
            ./scripts/dist.sh --skip-notarize
          else
            ./scripts/dist.sh --skip-sign
          fi

      - name: Verify app bundle
        run: |
          APP="VocaMac Lite.app"
          # No SPM resource bundle may sit at the .app root (codesign forbids it).
          if find "$APP" -maxdepth 1 -name "*.bundle" | grep -q .; then
            echo "❌ Found .bundle at app root"
            exit 1
          fi
          # The app's own resource bundle must be staged in Contents/Resources.
          test -d "$APP/Contents/Resources/VocaMac_VocaMac.bundle" || {
            echo "❌ VocaMac_VocaMac.bundle missing from Contents/Resources"
            exit 1
          }
          codesign -dvv "$APP" 2>&1 | grep -iE "Authority|Signature|Identifier=" || true
          if [ "${{ steps.cert.outputs.has_cert }}" = "true" ]; then
            if codesign -dvv "$APP" 2>&1 | grep -qi "Signature=adhoc"; then
              echo "❌ Expected a stable signature but the app is ad-hoc signed"
              exit 1
            fi
            echo "✅ Signed with the stable code-signing identity"
          fi
          echo "App bundle verified"

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 VocaMac-*.dmg > checksums.txt
          cat checksums.txt

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: VocaMac-${{ steps.version.outputs.VERSION }}-dmg
          path: |
            dist/VocaMac-*.dmg
            dist/checksums.txt

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/VocaMac-*.dmg
            dist/checksums.txt
          body: |
            ## Install

            **Homebrew (recommended):**
            ```
            brew tap vajahath/vocamac-lite
            brew trust vajahath/vocamac-lite
            brew install --cask vocamac-lite
            xattr -dr com.apple.quarantine "/Applications/VocaMac Lite.app"
            ```

            **Manual:** download the DMG below, drag VocaMac Lite to Applications, then
            run the same `xattr` command (this build is not signed with an Apple
            Developer ID), or right-click the app → Open → Open.

            Installs alongside the original VocaMac — no conflict.
