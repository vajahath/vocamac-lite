name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.1.0). Manual runs only upload an artifact; no release is published.'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build DMG & Release
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Initialize Xcode tools
        run: sudo xcodebuild -runFirstLaunch

      - name: Test
        run: swift test

      - name: Build unsigned DMG
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: ./scripts/dist.sh --skip-sign

      - name: Verify app bundle
        run: |
          # No SPM resource bundle may sit at the .app root (codesign forbids it).
          if find VocaMac.app -maxdepth 1 -name "*.bundle" | grep -q .; then
            echo "❌ Found .bundle at app root"
            exit 1
          fi
          # The app's own resource bundle must be staged in Contents/Resources.
          test -d "VocaMac.app/Contents/Resources/VocaMac_VocaMac.bundle" || {
            echo "❌ VocaMac_VocaMac.bundle missing from Contents/Resources"
            exit 1
          }
          codesign -dv VocaMac.app
          echo "App bundle verified"

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 VocaMac-*.dmg > checksums.txt
          cat checksums.txt

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: VocaMac-${{ steps.version.outputs.VERSION }}-dmg
          path: |
            dist/VocaMac-*.dmg
            dist/checksums.txt

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/VocaMac-*.dmg
            dist/checksums.txt
          body: |
            ## Install

            **Homebrew (recommended):**
            ```
            brew tap vajahath/vocamac-lite
            brew trust vajahath/vocamac-lite
            brew install --cask vocamac-lite
            xattr -dr com.apple.quarantine /Applications/VocaMac.app
            ```

            **Manual:** download the DMG below, drag VocaMac to Applications, then
            run the same `xattr` command (this build is not signed with an Apple
            Developer ID), or right-click the app → Open → Open.
