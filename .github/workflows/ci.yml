name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test App
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build (Debug)
        run: swift build

      - name: Test
        run: swift test

      - name: Build (Release)
        run: swift build -c release

      - name: Initialize Xcode tools
        run: sudo xcodebuild -runFirstLaunch

      - name: Verify app bundle
        run: |
          ./scripts/build.sh release
          test -d "VocaMac Lite.app" || exit 1
          codesign -v "VocaMac Lite.app" || echo "Codesign verification note: expected for ad-hoc CI builds"
          test -f "VocaMac Lite.app/Contents/Resources/Assets.car" || echo "⚠️ Assets.car missing"
          echo "App bundle verified"
