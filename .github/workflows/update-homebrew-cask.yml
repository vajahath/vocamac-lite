# Updates the Homebrew tap cask (vajahath/homebrew-vocamac-lite) when a GitHub Release is published.
# Downloads the release DMG, computes its sha256, and commits the updated version+checksum to the tap repo.
# Requires a HOMEBREW_TAP_TOKEN secret (PAT with write access to the tap repo).
name: Update Homebrew Cask

on:
  release:
    types: [published]

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Extracted version: ${VERSION}"

      - name: Download DMG artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_URL="https://github.com/vajahath/vocamac-lite/releases/download/v${VERSION}/VocaMac-${VERSION}-arm64.dmg"
          curl -sL -o vocamac.dmg "$DMG_URL"
          echo "Downloaded DMG from ${DMG_URL}"

      - name: Compute DMG sha256
        id: checksum
        run: |
          SHA256=$(shasum -a 256 vocamac.dmg | cut -d' ' -f1)
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "Computed sha256: ${SHA256}"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: vajahath/homebrew-vocamac-lite
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-vocamac-lite

      - name: Update cask file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.checksum.outputs.sha256 }}"
          CASK_FILE="homebrew-vocamac-lite/Casks/vocamac-lite.rb"

          # Update the version line
          sed -i "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK_FILE"
          # Update the sha256 line
          sed -i "s/^  sha256 \".*\"/  sha256 \"${SHA256}\"/" "$CASK_FILE"

          echo "Updated ${CASK_FILE}:"
          grep -E "^\s+(version|sha256)" "$CASK_FILE"

      - name: Commit and push to tap repo
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd homebrew-vocamac-lite
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/vocamac-lite.rb
          git commit -m "chore: update vocamac-lite to v${VERSION}"
          git push
