# Updates the Homebrew tap cask (vajahath/homebrew-vocamac-lite) after a release is published.
#
# Triggered via workflow_run (not `release: published`) on purpose: a release
# created by the Release workflow's built-in GITHUB_TOKEN does NOT trigger
# `release`-event workflows, so workflow_run is the reliable hook.
#
# Requires a HOMEBREW_TAP_TOKEN secret (PAT with write access to the tap repo).
# If the secret is not set, the job skips cleanly (update the cask manually).
name: Update Homebrew Cask

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  update-cask:
    # Only run after a successful, tag-triggered Release build.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap token
        id: guard
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$HOMEBREW_TAP_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::HOMEBREW_TAP_TOKEN is not set — skipping automatic cask update. Update the cask manually or add the secret."
          fi

      - name: Resolve latest release version
        if: steps.guard.outputs.has_token == 'true'
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release view --repo "${{ github.repository }}" --json tagName --jq .tagName)
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest release: ${TAG} (version ${VERSION})"

      - name: Download DMG and compute sha256
        if: steps.guard.outputs.has_token == 'true'
        id: checksum
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/VocaMac-${VERSION}-arm64.dmg"
          curl -fsSL -o vocamac.dmg "$DMG_URL"
          SHA256=$(shasum -a 256 vocamac.dmg | cut -d' ' -f1)
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "sha256: ${SHA256}"

      - name: Checkout tap repo
        if: steps.guard.outputs.has_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: vajahath/homebrew-vocamac-lite
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-vocamac-lite

      - name: Update and push cask
        if: steps.guard.outputs.has_token == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.checksum.outputs.sha256 }}"
          CASK_FILE="homebrew-vocamac-lite/Casks/vocamac-lite.rb"

          sed -i "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK_FILE"
          sed -i "s/^  sha256 \".*\"/  sha256 \"${SHA256}\"/" "$CASK_FILE"

          echo "Updated ${CASK_FILE}:"
          grep -E "^\s+(version|sha256)" "$CASK_FILE"

          cd homebrew-vocamac-lite
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Cask already up to date; nothing to commit."
          else
            git add Casks/vocamac-lite.rb
            git commit -m "chore: update vocamac-lite to v${VERSION}"
            git push
          fi
